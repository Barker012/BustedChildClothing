            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.5rem;

        }
        .loader {

        @keyframes spin {

        p {

            margin-top: 30px;
        }
